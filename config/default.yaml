anatomy_bank:
  bank_dir: banks/anatomy
  anatomy_ids:
    - fsaverage
    - mne_sample
    - nyhead
  parcellation_scheme: deepsif_994

leadfield_bank:
  bank_dir: banks/leadfield
  conductivity_ids:
    - standard

montage_bank:
  bank_dir: banks/montage
  montages:
    - {name: standard_1005_32,  n_channels: 32,  split_role: core}
    - {name: standard_1005_64,  n_channels: 64,  split_role: core}
    - {name: standard_1005_76,  n_channels: 76,  split_role: core}
    - {name: standard_1005_90,  n_channels: 90,  split_role: core}
    - {name: standard_1005_128, n_channels: 128, split_role: core}
    - {name: standard_1005_256, n_channels: 256, split_role: core}
    - {name: standard_1005_21,  n_channels: 21,  split_role: ood}

connectivity_bank:
  bank_dir: banks/connectivity
  schemes:
    - desikan_killiany

scenario_plan:
  prior_family_weights:
    local_contiguous: 0.30
    network_aware:    0.25
    state_dependent:  0.20
    broad_random:     0.15
    tvb_stub:         0.10
  n_sources_weights:
    weights:
      1: 0.20
      2: 0.25
      3: 0.30
      4: 0.25
  difficulty_weights:
    easy:   0.40
    medium: 0.35
    hard:   0.25
  ood_fraction: 0.10

temporal:
  sfreq: 500.0
  window_s: 1.0
  signal_families:
    - erp
    - oscillatory_burst
    - ar_correlated
    - spike_interictal

background:
  families:
    - nmm_background
    - colored_1f
    - ar_background
  weights: [0.4, 0.4, 0.2]

noise:
  families:
    - white_gaussian
    - colored_1f
    - empirical_resting
  weights: [0.5, 0.3, 0.2]
  snr_core_range_db: [0.0, 20.0]
  snr_hard_range_db: [-5.0, 30.0]

artifacts:
  families:
    - ocular
    - muscular
    - line_noise
    - bad_channel_dropout
  artifact_prob: 0.30

reference:
  scheme: average

qc:
  min_valid_channels: 10
  max_snir_deviation_db: 5.0
  min_inter_source_distance_mm: 10.0

writer:
  output_dir: data/generated
  chunk_size: 256

backend: sereega
tvb:
  model: jansen_rit
  connectivity_scheme: deepsif_994
  global_coupling: 0.02
  noise_sigma: 1.0e-5
  integrator_dt_ms: 1.0
  warmup_s: 5.0
  reservoir_duration_s: 60.0
  reservoir_size: 100
  stimulus_amplitude: 1.0
  conduction_speed_mm_per_ms: 3.0
n_samples: 100000
n_workers: 4
global_seed: 1234