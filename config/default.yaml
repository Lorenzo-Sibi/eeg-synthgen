anatomy_bank:
  bank_dir: banks/anatomy
  anatomy_ids:
    - fsaverage
    - mne_sample
    - nyhead
  parcellation_scheme: deepsif_994

leadfield_bank:
  bank_dir: banks/leadfield
  conductivity_ids:
    - standard

montages:
  montages:
    - {name: standard_1005_32,  n_channels: 32,  split_role: core}
    - {name: standard_1005_64,  n_channels: 64,  split_role: core}
    - {name: standard_1005_76,  n_channels: 76,  split_role: core}
    - {name: standard_1005_90,  n_channels: 90,  split_role: core}
    - {name: standard_1005_128, n_channels: 128, split_role: core}
    - {name: standard_1005_256, n_channels: 256, split_role: core}
    - {name: standard_1005_21,  n_channels: 21,  split_role: ood}

connectivity_bank:
  bank_dir: banks/connectivity
  schemes:
    - deepsif_994

scenario_plan:
  prior_family_weights:
    local_contiguous: 0.30
    network_aware:    0.25
    state_dependent:  0.20
    broad_random:     0.15
    tvb_stub:         0.10
  n_sources_weights:
    weights:
      1: 0.20
      2: 0.25
      3: 0.30
      4: 0.25
  ood_fraction: 0.10

temporal:
  sfreq: 500.0
  window_s: 1.0
  signal_families:
    - erp
    - oscillatory_burst
    - ar_correlated
    - spike_interictal
  signal_family_weights: [0.25, 0.35, 0.20, 0.20]

background:
  families:
    - nmm_background
    - colored_1f
    - ar_background
  weights: [0.4, 0.4, 0.2]

noise:
  families:
    - white_gaussian
    - colored_1f
    - empirical_resting
    - empirical_channel_cov
  weights: [0.20, 0.20, 0.30, 0.30]
  # Discrete SNR/SNIR grid following the DeepSIF / ConvDip / ESINet protocol.
  # Each scenario draws one level uniformly from each list.
  snir_levels_db:        [0.0, 5.0, 10.0, 15.0, 20.0]
  snr_sensor_levels_db:  [-5.0, 0.0, 5.0, 10.0, 15.0, 20.0]
  calibration_id: physionet_v1   # reads banks/noise/{calibration_id}.npz at runtime

artifacts:
  families:
    - ocular
    - muscular
    - line_noise
    - bad_channel_dropout
  artifact_prob: 0.30

reference:
  scheme: average

qc:
  min_valid_channels: 10
  max_snir_deviation_db: 5.0
  min_inter_source_distance_mm: 10.0

writer:
  output_dir: data/generated
  chunk_size: 256

backend: sereega

sereega:
  matlab_sereega_path: /home/lorenzo/SEREEGA
  erp_peak_count_weights:
    1: 0.80
    2: 0.20
  latency_jitter_s_range: [0.05, 0.30]
  erp_width_s_range: [0.02, 0.08]
  burst_width_s_range: [0.10, 0.20]
  arm_order: 10
  patch_spatial_profile: gaussian
  patch_spatial_sigma_mm_range: [12.0, 25.0]

tvb:
  # DeepSIF-style Jansen-Rit (Sun 2022, Rong 2025): SigmoidalJansenRit coupling,
  # elevated A on seed parcels, single TVB simulation per sample.
  model: jansen_rit
  connectivity_scheme: deepsif_994
  global_coupling: 1.0          # `a` in SigmoidalJansenRit (DeepSIF default)
  noise_std: 1.0                # DeepSIF std parameter; sigma derived inside backend
  integrator_dt_ms: 0.5
  warmup_s: 5.0
  reservoir_duration_s: 60.0
  reservoir_size: 100
  conduction_speed_mm_per_ms: 3.0
  jr_A_baseline: 3.25
  jr_A_seed: 3.5
  jr_mu: 0.083
  jr_v0: 6.0
  jr_p_min: 0.03
  jr_p_max: 0.15

n_samples: 100000
n_workers: 4
global_seed: 1234
